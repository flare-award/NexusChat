async function startRecording() {
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
showNotification('Ошибка', 'Запись голоса недоступна в этом браузере', '⚠️');
return;
}

try {
const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
App.mediaStream = stream;
App.audioChunks = [];
App.mediaRecorder = new MediaRecorder(stream);

App.mediaRecorder.ondataavailable = e => {
if (e.data && e.data.size > 0) App.audioChunks.push(e.data);
};

App.mediaRecorder.onstop = async () => {
const blob = new Blob(App.audioChunks, { type: 'audio/webm' });
const reader = new FileReader();
reader.onload = () => {
const voiceMsg = {
id: uid(),
from: App.currentUser.id,
type: 'voice',
voice: reader.result,
duration: '0:00',
timestamp: ts(),
replyTo: App.replyTo || null,
readBy: [App.currentUser.id],
reactions: {},
status: 'sent'
};
DB.addMessage(App.currentChatId, voiceMsg);
App.replyTo = null;
renderReplyBar();
App.lastRenderedMessages[App.currentChatId] = '';
renderMessages(true);
renderChatList();
scrollToBottomChat();
};
reader.readAsDataURL(blob);

stream.getTracks().forEach(t => t.stop());
};

App.isRecording = true;
App.recordingSeconds = 0;
document.getElementById('record-btn')?.classList.add('recording');
document.getElementById('record-indicator')?.style && (document.getElementById('record-indicator').style.display = 'flex');
document.getElementById('record-indicator').innerHTML = `
<div class="record-dot"></div>
<div class="record-time" id="record-time">0:00</div>
<button class="record-cancel" onclick="stopRecording(true)">Отмена</button>
`;

App.recordingTimer = setInterval(() => {
App.recordingSeconds++;
const m = Math.floor(App.recordingSeconds / 60);
const s = String(App.recordingSeconds % 60).padStart(2, '0');
const t = document.getElementById('record-time');
if (t) t.textContent = `${m}:${s}`;
}, 1000);

App.mediaRecorder.start();
} catch (err) {
showNotification('Ошибка', 'Нет доступа к микрофону', '⚠️');
}
}

function stopRecording(cancel = false) {
if (!App.isRecording) return;

clearInterval(App.recordingTimer);
App.recordingTimer = null;
App.isRecording = false;

document.getElementById('record-btn')?.classList.remove('recording');
const ind = document.getElementById('record-indicator');
if (ind) {
ind.style.display = 'none';
ind.innerHTML = '';
}

try {
if (App.mediaRecorder && App.mediaRecorder.state !== 'inactive') App.mediaRecorder.stop();
} catch (e) {}

if (cancel && App.mediaStream) {
App.mediaStream.getTracks().forEach(t => t.stop());
}
}

const img = document.getElementById('crop-image');
const scale = document.getElementById('crop-scale');
const state = { x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0 };

img.style.transformOrigin = 'center center';

scale.oninput = () => {
state.scale = parseFloat(scale.value);
apply();
};

img.onmousedown = ev => {
state.dragging = true;
state.startX = ev.clientX - state.x;
state.startY = ev.clientY - state.y;
};

function apply() {
img.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
}

document.addEventListener('mousemove', ev => {
if (!state.dragging) return;
state.x = ev.clientX - state.startX;
state.y = ev.clientY - state.startY;
apply();
});

document.addEventListener('mouseup', () => {
state.dragging = false;
});

window.__cropState = state;
window.__cropSrc = src;
window.__cropCb = cb;
window.__cropImg = img;
apply();
}

function finishAvatarCrop() {
const state = window.__cropState;
const canvas = document.createElement('canvas');
const size = 512;
canvas.width = size;
canvas.height = size;

const ctx = canvas.getContext('2d');
const source = new Image();

source.onload = () => {
ctx.save();
ctx.beginPath();
ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
ctx.clip();

const scale = state.scale || 1;
const drawW = source.width * scale;
const drawH = source.height * scale;
const x = (size - drawW) / 2 + (state.x || 0) * 2;
const y = (size - drawH) / 2 + (state.y || 0) * 2;

ctx.drawImage(source, x, y, drawW, drawH);
ctx.restore();

const out = canvas.toDataURL('image/jpeg', 0.92);
closeModal();
window.__cropCb?.(out);
};

source.src = window.__cropSrc;
}

function openStoryViewer(userId) {
const stories = DB.getStories().filter(s => s.userId === userId).sort((a, b) => a.timestamp - b.timestamp);
if (!stories.length) return;

let index = 0;
const viewer = document.createElement('div');
viewer.className = 'story-viewer';
viewer.id = 'story-viewer';

function renderStory() {
const s = stories[index];
if (!s.views) s.views = [];
if (!s.views.includes(App.currentUser.id)) s.views.push(App.currentUser.id);
DB.setStories(DB.getStories());

viewer.innerHTML = `
<div class="story-content">
<div class="story-progress-bar">
${stories.map((_, i) => `<div class="story-progress-seg"><div class="story-progress-fill" style="width:${i < index ? '100%' : i === index ? '100%' : '0%'}"></div></div>`).join('')}
</div>
<div class="story-header">
<div class="avatar sm">${(DB.getUser(userId)?.avatar ? `<img src="${DB.getUser(userId).avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (DB.getUser(userId)?.name || '?')[0].toUpperCase())}</div>
<div>
<div style="font-weight:700">${sanitize(DB.getUser(userId)?.name || '')}</div>
<div style="font-size:12px;color:rgba(255,255,255,.7)">${fmtTime(s.timestamp)}</div>
</div>
</div>
<button class="story-close-btn" onclick="closeStoryViewer()">×</button>
${s.type === 'video'
? `<video class="story-image" src="${s.content}" autoplay muted loop></video>`
: `<img class="story-image" src="${s.content}" alt="story">`}
</div>`;
}

viewer.onclick = e => {
if (e.target === viewer) closeStoryViewer();
};

viewer.addEventListener('click', e => {
if (e.target.closest('.story-close-btn')) return;
index = Math.min(stories.length - 1, index + 1);
if (index >= stories.length) {
closeStoryViewer();
} else {
renderStory();
}
});

document.body.appendChild(viewer);
renderStory();
}

function closeStoryViewer() {
document.getElementById('story-viewer')?.remove();
}

function showMemberMenu(e, userId, chatId) {
e.stopPropagation();
const chat = DB.getChat(chatId);
if (!chat) return;
const isAdmin = (chat.admins || []).includes(userId);

showDropdown(e, [
{ label: isAdmin ? 'Снять админа' : 'Сделать админом', icon: '⭐', action: () => toggleAdmin(chatId, userId) },
{ label: 'Написать', icon: '💬', action: () => { closeModal(); startChatWithUser(userId); } },
{ label: 'Удалить из группы', icon: '🚫', danger: true, action: () => kickFromGroup(chatId, userId) },
]);
}

function toggleAdmin(chatId, userId) {
const chat = DB.getChat(chatId);
if (!chat) return;
if (!chat.admins) chat.admins = [];

const idx = chat.admins.indexOf(userId);
if (idx === -1) {
chat.admins.push(userId);
showNotification('Администратор', 'Пользователь назначен администратором', '⭐');
} else {
chat.admins.splice(idx, 1);
showNotification('Готово', 'Права администратора сняты', '✅');
}
DB.setChat(chatId, chat);
closeModal();
openGroupInfo(chat);
renderChatList();
}

function kickFromGroup(chatId, userId) {
const chat = DB.getChat(chatId);
if (!chat) return;
chat.members = (chat.members || []).filter(m => m !== userId);
chat.admins = (chat.admins || []).filter(m => m !== userId);
DB.setChat(chatId, chat);
closeModal();
renderChatList();
if (App.currentChatId === chatId) {
App.lastRenderedMessages[chatId] = '';
renderMessages(true);
updateChatHeader();
}
showNotification('Удалено', 'Участник удалён', '✅');
}

});

function setupDragDrop() {
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
e.preventDefault();
const files = Array.from(e.dataTransfer?.files || []);
if (!files.length) return;
handleFileSelect({ target: { files } });
});
}

function handleFileSelect(e) {
const files = Array.from(e.target.files || []);
if (!files.length) return;

files.forEach(file => {
const reader = new FileReader();
reader.onload = ev => {
const url = ev.target.result;
if (file.type === 'image/gif') {
App.pendingAttachments.push({ url, type: 'gif', mime: 'image/gif', name: file.name, size: file.size, sendType: 'compressed' });
} else if (file.type.startsWith('image/')) {
App.pendingAttachments.push({ url, type: 'image', mime: file.type, name: file.name, size: file.size, sendType: 'compressed' });
} else if (file.type.startsWith('video/')) {
App.pendingAttachments.push({ url, type: 'video', mime: file.type, name: file.name, size: file.size, sendType: 'compressed' });
} else {
App.pendingAttachments.push({ url, type: 'file', mime: file.type, name: file.name, size: file.size, sendType: 'file' });
}
renderAttachmentsPreview();
};
reader.readAsDataURL(file);
});

e.target.value = '';
}

function renderAttachmentsPreview() {
const wrap = document.getElementById('attachments-preview');
if (!wrap) return;

if (!App.pendingAttachments.length) {
wrap.style.display = 'none';
wrap.innerHTML = '';
return;
}

wrap.style.display = 'flex';
wrap.innerHTML = App.pendingAttachments.map((att, i) => {
if (att.sendType === 'file') {
return `<div class="attachment-thumb">
<div class="file-attachment" style="padding:8px 10px;min-width:140px">
<span class="file-icon">📄</span>
<div class="file-info">
<div class="file-name">${sanitize(att.name || 'Файл')}</div>
<div class="file-size">${att.size ? formatBytes(att.size) : ''}</div>
</div>
</div>
<button class="remove-btn" onclick="removePendingAttachment(${i})">✕</button>
</div>`;
}
if (att.type === 'video') {
return `<div class="attachment-thumb">
<video src="${att.url}" muted></video>
<button class="remove-btn" onclick="removePendingAttachment(${i})">✕</button>
</div>`;
}
return `<div class="attachment-thumb">
<img src="${att.url}" alt="media">
<button class="remove-btn" onclick="removePendingAttachment(${i})">✕</button>
</div>`;
}).join('');
}

function togglePinnedMsg() {
const chat = DB.getChat(App.currentChatId);
if (!chat) return;
const msgs = DB.getMessages(chat.id).filter(m => !m.deleted);
const last = msgs[msgs.length - 1];
if (!last) return showNotification('Пусто', 'Нет сообщений для закрепления', '📌');

if (chat.pinnedMsg === last.id) {
chat.pinnedMsg = null;
showNotification('Снято', 'Закреплённое сообщение убрано', '📌');
} else {
chat.pinnedMsg = last.id;
showNotification('Закреплено', 'Сообщение закреплено', '📌');
}
DB.setChat(chat.id, chat);
updatePinnedBar();
}

function updatePinnedBar() {
const chat = DB.getChat(App.currentChatId);
const bar = document.getElementById('pinned-bar');
if (!chat || !bar) return;
const pinned = chat.pinnedMsg ? DB.getMessages(chat.id).find(m => m.id === chat.pinnedMsg) : null;

if (!pinned) {
bar.style.display = 'none';
bar.innerHTML = '';
return;
}

const sender = DB.getUser(pinned.from);
bar.style.display = 'block';
bar.innerHTML = `
<div class="pinned-bar" onclick="scrollToMessage('${pinned.id}')">
<span class="icon">📌</span>
<div class="pinned-content">
<div class="pinned-label">Закреплённое сообщение</div>
<div class="pinned-text">${sanitize((sender?.name ? sender.name + ': ' : '') + (pinned.text || pinned.sticker || 'Сообщение'))}</div>
</div>
<button class="icon-btn" onclick="event.stopPropagation();unpinMessage()" title="Снять">✕</button>
</div>`;
}

function unpinMessage() {
const chat = DB.getChat(App.currentChatId);
if (!chat) return;
chat.pinnedMsg = null;
DB.setChat(chat.id, chat);
updatePinnedBar();
}

<div class="update-title">NexChat</div>
<div class="text-muted">Локальный прототип мессенджера с аккаунтами, чатами, группами, каналами и историями.</div>
</div>
</div>`;
}

function toggleSetting(key, value) {
App.settings[key] = value;
if (key === 'roundedUI') document.documentElement.classList.toggle('rounded-ui', !!value);
if (key === 'fontSize') document.documentElement.style.fontSize = value + 'px';
saveCurrentUserSettings();
renderSettingsContent(App.settingsSection || 'profile');
}

function toggleIntegration(id) {
const u = DB.getUser(App.currentUser.id);
if (!u.integrations) u.integrations = [];
const idx = u.integrations.findIndex(i => i.id === id);
if (idx === -1) {
u.integrations.push({ id, name: id === 'discord' ? 'Discord' : id === 'youtube' ? 'YouTube' : 'Music', icon: id === 'discord' ? '🎮' : id === 'youtube' ? '▶️' : '🎧' });
} else {
u.integrations.splice(idx, 1);
}
DB.setUser(u.id, u);
App.currentUser = u;
renderSettingsContent('integrations');
}

function saveCurrentUserSettings() {
const u = DB.getUser(App.currentUser.id);
u.settings = { ...(u.settings || {}), ...App.settings };
DB.setUser(u.id, u);
App.currentUser = u;
}

let profileSaveTimer = null;
function saveProfileDebounced() {
clearTimeout(profileSaveTimer);
profileSaveTimer = setTimeout(saveProfileNow, 250);
}

function saveProfileNow() {
const u = DB.getUser(App.currentUser.id);
if (!u) return;

const name = document.getElementById('set-name')?.value.trim();
const username = document.getElementById('set-username')?.value.trim();
const bio = document.getElementById('set-bio')?.value.trim();
const status = document.getElementById('set-status')?.value.trim();
const musicTitle = document.getElementById('set-music-title')?.value.trim();
const musicArtist = document.getElementById('set-music-artist')?.value.trim();

if (name) u.name = name;
if (username && validateUsername(username)) {
const used = Object.values(DB.getUsers()).some(x => x.username === username && x.id !== u.id);
if (!used) u.username = username;
}
u.bio = bio || '';
u.status = status || '';
u.music = musicTitle || musicArtist ? { title: musicTitle || 'Без названия', artist: musicArtist || 'Неизвестно' } : null;
u.settings = { ...(u.settings || {}), ...App.settings };

DB.setUser(u.id, u);
App.currentUser = u;

updateSidebarUser();
renderChatList();
renderStoriesBar();
showNotification('Сохранено', 'Профиль обновлён', '✅');
}

function switchToAccount(userId) {
const user = DB.getUser(userId);
if (!user) return;
DB.setCurrentUid(userId);
App.currentUser = user;
applySettings();
closeModal();
closeSettings();
renderSidebar();
renderStoriesBar();
renderChatList();
if (App.currentChatId) openChat(App.currentChatId);
}

function toggleAccountSwitcher() {
const sessions = DB.getSessions().map(id => DB.getUser(id)).filter(Boolean);
openModal(`
<div class="modal-header"><span class="modal-title">Аккаунты</span><button class="modal-close" onclick="closeModal()">✕</button></div>
<div class="modal-body">
<div class="account-switcher">
${sessions.map(acc => `
<div class="account-item ${acc.id === App.currentUser.id ? 'active' : ''}" onclick="switchToAccount('${acc.id}')">
<div class="avatar sm">${acc.avatar ? `<img src="${acc.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (acc.name || '?')[0].toUpperCase()}</div>
<div class="account-item-info"><div class="account-item-name">${sanitize(acc.name || '')}</div><div class="account-item-user">@${sanitize(acc.username || '')}</div></div>
</div>`).join('')}
</div>
<button class="btn btn-sm mt-16" onclick="handleLogout()">Добавить / выйти</button>
</div>`);
}

function handleLogout() {
DB.removeSession(App.currentUser.id);
DB.setCurrentUid(null);
App.currentUser = null;
App.currentChatId = null;
location.reload();
}

function initExistingDataFixes() {
const chats = DB.getChats();
let changed = false;
Object.values(chats).forEach(chat => {
if ((chat.type === 'group' || chat.type === 'channel') && !chat.username) {
chat.username = generateUsername();
changed = true;
}
if (chat.isPublic == null) {
chat.isPublic = true;
changed = true;
}
if (!chat.createdAt) {
chat.createdAt = ts();
changed = true;
}
});
if (changed) DB.setChats(chats);
}
initExistingDataFixes();

function forceRefreshViews() {
renderSidebar();
renderStoriesBar();
if (App.currentChatId) {
updateChatHeader();
updatePinnedBar();
renderMessages(false);
}
}

setInterval(() => {
if (App.currentUser) {
setOnline(true);
forceRefreshViews();
}
}, 1500);

window.addEventListener('resize', () => {
if (document.getElementById('emoji-panel')) renderEmojiPanel();
});

document.getElementById('global-search-input')?.addEventListener('blur', () => {
setTimeout(() => document.getElementById('search-results')?.style && (document.getElementById('search-results').style.display = 'none'), 120);
});

window.addEventListener('beforeunload', () => {
try {
setOnline(false);
} catch (e) {}
});

// ---- END OF FILE ----
</script>
</body>
